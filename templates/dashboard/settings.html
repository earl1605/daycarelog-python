{% extends "layouts/app.html" %}
{% load static %}
{% block title %}Settings - DaycareLog{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <h1 class="text-[22px] font-bold text-gray-900">Settings</h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <div class="bg-white rounded-xl border border-gray-200/70 p-6 space-y-4">
            <h2 class="text-[17px] font-bold text-gray-900">Profile</h2>

            <div class="flex flex-col items-center py-2">
                <button type="button" id="photo-trigger"
                    class="relative group w-20 h-20 rounded-full overflow-hidden ring-4 ring-primary-100 hover:ring-primary-300 transition-all">
                    {% if user.profile_photo %}
                        <img id="photo-preview" src="{{ user.profile_photo }}" alt="Profile" class="w-full h-full object-cover">
                    {% else %}
                        <div id="photo-preview" class="w-full h-full bg-primary-100 text-primary-700 flex items-center justify-center text-2xl font-bold">
                            {{ user.first_name|default:user.email|first|upper }}
                        </div>
                    {% endif %}
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <span class="text-white text-xs font-medium">Change</span>
                    </div>
                </button>
                <p class="text-xs text-gray-400 mt-1.5">Click to change photo</p>
                <input type="file" id="photo-input" accept="image/*" class="hidden">
            </div>

            <form method="post" id="photo-form" class="hidden">
                {% csrf_token %}
                <input type="hidden" name="profile_photo" id="photo-data">
                <input type="hidden" name="save_photo" value="1">
            </form>

            <form method="post" novalidate class="form-styled space-y-3">
                {% csrf_token %}
                <div class="grid grid-cols-2 gap-3">
                    {{ profile_form.as_p }}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <input type="email" value="{{ user.email }}" disabled
                        class="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-2.5 text-sm text-gray-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Role</label>
                    <input type="text" value="{{ user.get_role_display }}" disabled
                        class="w-full border border-gray-100 bg-gray-50 rounded-xl px-4 py-2.5 text-sm text-gray-400">
                </div>

                <button type="submit" name="save_profile" value="1"
                    class="bg-primary-600 hover:bg-primary-700 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors text-sm">
                    Save Changes
                </button>
            </form>
        </div>

        <div class="bg-white rounded-xl border border-gray-200/70 p-6 space-y-4">
            <h2 class="text-[17px] font-bold text-gray-900">Change Password</h2>
            <form method="post" novalidate class="form-styled space-y-3">
                {% csrf_token %}
                {{ password_form.as_p }}
                <button type="submit" name="save_password" value="1"
                    class="bg-primary-600 hover:bg-primary-700 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors text-sm">
                    Update Password
                </button>
            </form>
        </div>

    </div>
</div>

<script>
    (function () {
        var trigger = document.getElementById('photo-trigger');
        var fileInput = document.getElementById('photo-input');
        var dataInput = document.getElementById('photo-data');
        var form = document.getElementById('photo-form');
        var preview = document.getElementById('photo-preview');

        trigger.addEventListener('click', function () { fileInput.click(); });

        fileInput.addEventListener('change', function () {
            var file = fileInput.files && fileInput.files[0];
            if (!file) return;

            var img = new Image();
            var url = URL.createObjectURL(file);
            img.onload = function () {
                var maxSize = 256;
                var scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
                var canvas = document.createElement('canvas');
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                URL.revokeObjectURL(url);

                var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                dataInput.value = dataUrl;

                if (preview.tagName === 'IMG') {
                    preview.src = dataUrl;
                } else {
                    var newImg = document.createElement('img');
                    newImg.id = 'photo-preview';
                    newImg.alt = 'Profile';
                    newImg.className = 'w-full h-full object-cover';
                    newImg.src = dataUrl;
                    preview.replaceWith(newImg);
                }

                form.submit();
            };
            img.src = url;
        });
    })();
</script>
<script src="{% static 'js/capitalize-name.js' %}"></script>
{% endblock %}
