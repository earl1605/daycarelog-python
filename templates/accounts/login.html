{% extends "base.html" %}
{% block title %}Login - DaycareLog{% endblock %}
{% block content %}
    <h1>Login</h1>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log In</button>
    </form>
    <p>Don't have an account? <a href="{% url 'accounts:register' %}">Register as a Parent/Guardian</a></p>
{% endblock %}
