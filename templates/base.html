{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DaycareLog{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    <link rel="shortcut icon" href="{% static 'img/favicon.svg' %}">
    <link rel="apple-touch-icon" href="{% static 'img/favicon.svg' %}">
    <meta name="theme-color" content="#052e16">
    <link rel="stylesheet" href="{% static 'css/tailwind-built.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="antialiased text-gray-900">
    {% if messages %}
        <div class="fixed top-4 right-4 z-50 space-y-2 w-full max-w-xs">
            {% for message in messages %}
                <div class="toast-message transition-opacity duration-300 px-4 py-3 rounded-xl shadow-lg text-sm font-medium
                    {% if message.tags == 'success' %}bg-primary-600 text-white
                    {% elif message.tags == 'error' %}bg-red-600 text-white
                    {% else %}bg-gray-800 text-white{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        <script>
            document.querySelectorAll('.toast-message').forEach(function (toast) {
                setTimeout(function () {
                    toast.style.opacity = '0';
                    setTimeout(function () { toast.remove(); }, 300);
                }, 2000);
            });
        </script>
    {% endif %}
    {% block body %}{% endblock %}
</body>
</html>
